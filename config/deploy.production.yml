# Kamal configuration for ember-app-server (Production)
service: <%= ENV['SERVICE_NAME'] || 'ember-app-server' %>
image: weteachme/ember-app-server

registry:
  server: 163645997305.dkr.ecr.ap-southeast-2.amazonaws.com
  username: AWS
  password: <%= ENV["KAMAL_REGISTRY_PASSWORD"] || `aws ecr get-login-password --region ap-southeast-2`.strip %>

# Production server
servers:
  - backend-node.taildbf88f.ts.net

proxy:
  ssl: true
  host: dashboard.weteachme.com
  app_port: 3000
  healthcheck:
    path: /
    interval: 5
    timeout: 5

ssh:
  user: ec2-user
  keys: ["~/.ssh/aws-wtm.pem"]

# Volume mount: host folder -> container /app
# Sinatra app reads ../app/index.html relative to /app
volume: /data/ember-app:/app

builder:
  dockerfile: Dockerfile
  context: .
  arch: arm64