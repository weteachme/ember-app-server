# Kamal configuration for ember-app-server (Preview)
# Usage: SERVICE_NAME=my-ember-app HOST=dashboard-preview.weteachme.com kamal deploy -c config/deploy.preview.yml
service: <%= ENV['SERVICE_NAME'] %>
image: weteachme/ember-app-server

proxy:
  host: <%= ENV['HOST'] %>

# Volume mount for preview: /data/ember-app/<SERVICE_NAME>
volumes:
  - /data/ember-app/<%= ENV['SERVICE_NAME'] %>:/ember-app
